<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GlowStack — Beauty & Fashion Creator Platform</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --b50:#fdf2f8;--b100:#fce7f3;--b200:#fbcfe8;--b300:#f9a8d4;--b400:#f472b6;--b500:#ec4899;--b600:#db2777;--b700:#be185d;
  --s50:#f8fafc;--s100:#f1f5f9;--s200:#e2e8f0;--s300:#cbd5e1;--s400:#94a3b8;--s500:#64748b;--s600:#475569;--s700:#334155;--s800:#1e293b;--s900:#0f172a;
}
body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--s50); color: var(--s800); height: 100vh; overflow: hidden; }
.app { display: flex; height: 100vh; }

/* Sidebar */
.sidebar { width: 250px; background: #fff; border-right: 1px solid var(--s200); display: flex; flex-direction: column; flex-shrink: 0; }
.logo { display: flex; align-items: center; gap: 10px; padding: 20px; border-bottom: 1px solid var(--s100); }
.logo-icon { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--b400), var(--b600)); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; }
.logo h1 { font-size: 15px; font-weight: 700; line-height: 1.2; }
.logo p { font-size: 11px; color: var(--s400); }
nav { flex: 1; padding: 12px; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }
.nav-btn { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 10px; font-size: 14px; font-weight: 500; color: var(--s600); cursor: pointer; border: none; background: none; width: 100%; text-align: left; transition: all .15s; }
.nav-btn:hover { background: var(--b50); color: var(--b600); }
.nav-btn.active { background: var(--b50); color: var(--b600); }
.nav-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

/* Main */
.main { flex: 1; overflow-y: auto; }
.page { padding: 28px 32px; max-width: 1200px; margin: 0 auto; }
.page h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.page .subtitle { font-size: 14px; color: var(--s500); margin-bottom: 24px; }

/* Cards */
.card { background: #fff; border-radius: 14px; border: 1px solid var(--s200); box-shadow: 0 1px 2px rgba(0,0,0,.04); }
.card-hover { background: #fff; border-radius: 14px; border: 1px solid var(--s200); box-shadow: 0 1px 2px rgba(0,0,0,.04); transition: all .2s; cursor: pointer; }
.card-hover:hover { box-shadow: 0 4px 12px rgba(0,0,0,.08); border-color: var(--b200); }

/* Buttons */
.btn-primary { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 10px; background: var(--b500); color: #fff; font-weight: 500; font-size: 13px; border: none; cursor: pointer; }
.btn-primary:hover { background: var(--b600); }
.btn-secondary { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 10px; background: #fff; color: var(--s700); font-weight: 500; font-size: 13px; border: 1px solid var(--s200); cursor: pointer; }
.btn-ghost { display: inline-flex; align-items: center; gap: 6px; padding: 8px 12px; border-radius: 10px; color: var(--s600); font-weight: 500; font-size: 13px; border: none; background: none; cursor: pointer; }
.btn-ghost:hover { background: var(--s100); }
.badge { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 500; }
.input { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--s200); font-size: 14px; font-family: inherit; outline: none; }
.input:focus { border-color: var(--b400); box-shadow: 0 0 0 3px var(--b100); }

/* Grids */
.grid { display: grid; gap: 16px; }
.g2 { grid-template-columns: 1fr 1fr; }
.g3 { grid-template-columns: 1fr 1fr 1fr; }
.g4 { grid-template-columns: repeat(4, 1fr); }

/* Platform Icon */
.plat { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 9px; flex-shrink: 0; }

/* Charts (pure CSS) */
.bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 190px; padding-top: 8px; }
.bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; gap: 4px; }
.bar { width: 100%; border-radius: 6px 6px 0 0; transition: height .5s; min-width: 20px; }
.bar-lbl { font-size: 11px; color: var(--s400); }
.bar-val { font-size: 10px; font-weight: 600; color: var(--s700); }
.line-chart { position: relative; height: 200px; }
.line-chart svg { width: 100%; height: 100%; }
.donut { position: relative; width: 130px; height: 130px; margin: 0 auto; }
.donut svg { transform: rotate(-90deg); }
.donut-center { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; }

/* Chat */
.chat-wrap { height: 100vh; display: flex; flex-direction: column; }
.chat-header { padding: 16px 32px; border-bottom: 1px solid var(--s200); background: #fff; }
.chat-msgs { flex: 1; overflow-y: auto; padding: 24px 32px; }
.chat-input { padding: 16px 32px; border-top: 1px solid var(--s200); background: #fff; display: flex; gap: 8px; }
.bubble { max-width: 75%; border-radius: 16px; padding: 12px 16px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
.bubble-user { background: var(--b500); color: #fff; border-bottom-right-radius: 4px; margin-left: auto; }
.bubble-ai { background: #fff; border: 1px solid var(--s200); border-bottom-left-radius: 4px; }
.msg-row { display: flex; gap: 10px; margin-bottom: 16px; }
.msg-row.user { flex-direction: row-reverse; }
.avatar { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; }

/* Insight */
.insight { border-radius: 10px; padding: 14px; display: flex; gap: 12px; }
.insight h4 { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
.insight p { font-size: 11px; color: var(--s600); line-height: 1.5; }

/* Animations */
@keyframes pulse { 0%,80%,100% { opacity:.3; } 40% { opacity:1; } }
.typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--b300); display: inline-block; animation: pulse 1.4s infinite ease-in-out; }
.typing-dot:nth-child(2) { animation-delay: .16s; }
.typing-dot:nth-child(3) { animation-delay: .32s; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: var(--s200); border-radius: 3px; }

/* Responsive */
@media (max-width: 1024px) { .sidebar { display: none; } .g4 { grid-template-columns: 1fr 1fr; } .g3 { grid-template-columns: 1fr; } }
@media (max-width: 640px) { .g4,.g2 { grid-template-columns: 1fr; } .page { padding: 16px; } }
</style>
</head>

function platIcon(id, size=28) {
  const p = platforms.find(x=>x.id===id) || {bg:'#94a3b8',lbl:'?'};
  return `<div class="plat" style="width:${size}px;height:${size}px;background:${p.bg};font-size:${size*.32}px">${p.lbl}</div>`;
}

function svgLine(data, lines, w=400, h=180) {
  const allV = lines.flatMap(l => data.map(d => d[l.key]));
  const max = Math.max(...allV), min = Math.min(...allV), range = max-min||1;
  const pad = 10;
  let svg = `<svg viewBox="0 0 ${w} ${h+30}" style="width:100%;height:100%">`;
  // grid
  for (let i=0;i<=4;i++) {
    const y = pad+(h-2*pad)*(i/4);
    svg += `<line x1="30" x2="${w}" y1="${y}" y2="${y}" stroke="#e2e8f0" stroke-width="0.5"/>`;
    const v = Math.round(max - (i/4)*range);
    svg += `<text x="26" y="${y+4}" text-anchor="end" fill="#94a3b8" font-size="9">${v>1000?(v/1000).toFixed(0)+'K':v}</text>`;
  }
  // lines
  lines.forEach(line => {
    const pts = data.map((d,i) => {
      const x = 30 + (i/(data.length-1))*(w-40);
      const y = pad + (h-2*pad)*(1-(d[line.key]-min)/range);
      return `${x},${y}`;
    }).join(' ');
    svg += `<polyline points="${pts}" fill="none" stroke="${line.color}" stroke-width="2" stroke-linejoin="round"/>`;
  });
  // x labels
  data.forEach((d,i) => {
    if (i%3===0 || i===data.length-1) {
      const x = 30+(i/(data.length-1))*(w-40);
      svg += `<text x="${x}" y="${h+20}" text-anchor="middle" fill="#94a3b8" font-size="9">${d.date}</text>`;
    }
  });
  svg += '</svg>';
  // legend
  svg += '<div style="display:flex;gap:16px;justify-content:center;margin-top:4px">';
  lines.forEach(l => { svg += `<div style="display:flex;align-items:center;gap:4px;font-size:11px"><div style="width:14px;height:3px;border-radius:2px;background:${l.color}"></div><span style="color:var(--s500)">${l.label}</span></div>`; });
  svg += '</div>';
  return svg;
}

function svgBars(data, valKey, nameKey, colors, unit='') {
  const max = Math.max(...data.map(d=>d[valKey]));
  let html = '<div class="bar-chart">';
  data.forEach((d,i) => {
    const pct = (d[valKey]/max)*100;
    html += `<div class="bar-col"><div class="bar-val">${d[valKey]}${unit}</div><div class="bar" style="height:${pct}%;background:${colors[i]}"></div><div class="bar-lbl">${d[nameKey]}</div></div>`;
  });
  return html + '</div>';
}

function svgDonut(data, size=130) {
  const total = data.reduce((s,d)=>s+d.val,0);
  const r=45, circ=2*Math.PI*r;
  let off=0, svg=`<div class="donut" style="width:${size}px;height:${size}px"><svg width="${size}" height="${size}" viewBox="0 0 130 130">`;
  data.forEach(d => {
    const dash = circ*(d.val/total), gap = circ-dash;
    svg += `<circle cx="65" cy="65" r="${r}" fill="none" stroke="${d.fill}" stroke-width="18" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-off}"/>`;
    off += dash;
  });
  svg += `</svg><div class="donut-center">$${(total/1000).toFixed(1)}K</div></div>`;
  return svg;
}

// ── Interactions ───────────────────────────────────────────
function togglePlatform(id) {
  const el = document.getElementById('plat-'+id);
  if (el) el.style.display = el.style.display==='none'?'block':'none';
}

function filterMedia() {
  const q = document.getElementById('media-search')?.value?.toLowerCase() || '';
  const grid = document.getElementById('media-grid');
  if (!grid) return;
  const filtered = media.filter(m =>
    !q || m.title.toLowerCase().includes(q) || m.desc.toLowerCase().includes(q) || m.tags.some(t=>t.toLowerCase().includes(q))
  );
  grid.innerHTML = filtered.map(renderMediaCard).join('');
}

function showMediaDetail(id) {
  const a = media.find(m=>m.id===id);
  if (!a) return;
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px';
  modal.onclick = () => modal.remove();
  modal.innerHTML = `
    <div class="card" style="max-width:700px;width:100%;max-height:85vh;overflow:auto" onclick="event.stopPropagation()">
      <div style="display:flex;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--s200)">
        <h3 style="font-weight:600">${a.title}</h3>
        <button onclick="this.closest('[style*=fixed]').remove()" style="background:none;border:none;cursor:pointer;font-size:18px">✕</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr">
        <div style="background:${a.color};display:flex;align-items:center;justify-content:center;padding:32px;min-height:250px">
          <span style="font-size:16px;font-weight:600;color:#555;text-align:center">${a.title}</span>
        </div>
        <div style="padding:20px">
          <div style="font-size:11px;font-weight:600;color:var(--s400);text-transform:uppercase;letter-spacing:1px">AI Description</div>
          <p style="font-size:13px;color:var(--s700);margin:4px 0 16px">${a.desc}</p>
          <div style="font-size:11px;font-weight:600;color:var(--s400);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Tags</div>
          <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px">
            ${a.tags.map(t=>`<span class="badge" style="background:var(--b100);color:var(--b700)">${t}</span>`).join('')}
          </div>
          <div style="font-size:11px;font-weight:600;color:var(--s400);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Quality Score</div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
            <div style="flex:1;height:8px;background:var(--s100);border-radius:4px;overflow:hidden">
              <div style="height:100%;border-radius:4px;width:${a.quality}%;background:linear-gradient(90deg,var(--b400),var(--b600))"></div>
            </div>
            <span style="font-size:14px;font-weight:600">${a.quality}%</span>
          </div>
          <button class="btn-primary" style="font-size:12px">✦ Generate AI Captions</button>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}

function aiRespond(msg) {
  const l = msg.toLowerCase();
  if (l.includes('perform')||l.includes('analytics')||l.includes('how am i')||l.includes('stats'))
    return "Here's your performance snapshot:\n\n📊 This Month Overview:\n• Total reach: 2.8M across platforms\n• Average engagement: 8.6% (industry avg is 3-5%)\n• Top post: GRWM Date Night on TikTok — 1.65M views\n• Affiliate revenue: $7,431.50\n\n🔥 Key insight: TikTok GRWM content is your strongest format at 12.1% engagement. I'd recommend increasing from 2x to 3x per week.";
  if (l.includes('best time')||l.includes('when should')||l.includes('when to post'))
    return "Based on your audience data:\n\n📸 Instagram: Tue & Thu, 6-8 PM EST\n🎵 TikTok: Fri & Sat, 7-9 PM EST\n🎬 YouTube: Sat & Sun, 10 AM-2 PM EST\n📌 Pinterest: Sun & Mon evenings\n\nYour reels get 40% more reach in these windows. Want me to adjust your calendar?";
  if (l.includes('caption')||l.includes('write'))
    return 'Here are caption ideas for your brand voice:\n\n1. "Not me spending 45 minutes on a \'no-makeup\' look 💀✨ But this 5-product routine is *the one*."\n\n2. "POV: Your skincare finally cleared the group chat 🧴💫"\n\n3. "Spring transition outfit that works for brunch AND meetings 🌸"\n\nWant me to tailor these for a specific platform?';
  if (l.includes('schedule')||l.includes('plan')||l.includes('calendar'))
    return "Here's my suggested content plan:\n\n📅 Thu: Instagram Reel — Wash Day Routine ✅\n📅 Fri: TikTok GRWM — Spring Look (peak day)\n📅 Sat: YouTube Tutorial — Spring Smokey Eye\n📅 Sun: Pinterest Board — Spring OOTDs\n📅 Mon: Instagram Carousel — Product Reviews\n\nYou have 12 unused high-quality assets. Want me to match them?";
  if (l.includes('report'))
    return "I can generate these reports:\n\n1. 📊 Weekly Performance — engagement, reach, growth\n2. 📋 Monthly Overview — comprehensive with trends\n3. 🎯 Platform Deep Dive — single platform detail\n4. 💰 Revenue Report — affiliate earnings & conversions\n5. 🔍 Content Audit — what's working + recommendations\n\nWhich would you like?";
  if (l.includes('tag')||l.includes('organize'))
    return "I can help organize your media library!\n\n🏷️ Auto-Tagging: All 8 assets have AI tags for content type, products, mood, and season.\n\n📁 Suggestions:\n• 3 assets tagged 'Makeup' could also use 'Tutorial'\n• 'Top Performer' should be on 2 more posts\n• Consider a 'Spring 2026' campaign tag\n\nWant me to apply these suggestions?";
  return "I can help with:\n\n📊 Analytics — performance reports, trends, revenue\n📅 Content Planning — scheduling, optimal times\n🏷️ Media — tagging, organizing, searching\n✍️ Captions — AI-generated ideas\n💡 Insights — growth recommendations\n📋 Reports — on-demand analytics\n\nWhat would you like to explore?";
}

function sendChat(text) {
  const input = document.getElementById('chat-input');
  const msg = text || (input?input.value.trim():'');
  if (!msg) return;
  if (input) input.value = '';

  chatMessages.push({role:'user', text: msg});
  render();

  // Scroll to bottom
  setTimeout(() => {
    const el = document.getElementById('chat-messages');
    if (el) el.scrollTop = el.scrollHeight;
  }, 50);

  // AI response after delay
  setTimeout(() => {
    chatMessages.push({role:'ai', text: aiRespond(msg)});
    render();
    setTimeout(() => {
      const el = document.getElementById('chat-messages');
      if (el) el.scrollTop = el.scrollHeight;
    }, 50);
  }, 600);
}

// ── Render ─────────────────────────────────────────────────
function render() {
  const main = document.getElementById('main');
  const renderers = {
    dashboard: renderDashboard,
    media: renderMedia,
    analytics: renderAnalytics,
    calendar: renderCalendar,
    chat: renderChat,
    settings: renderSettings,
  };
  main.innerHTML = (renderers[currentPage] || renderDashboard)();
}

// Boot
buildNav();
render();
</script>
